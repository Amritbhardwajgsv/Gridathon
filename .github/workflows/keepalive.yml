name: Keep Services Alive

on:
  schedule:
    # Every 10 minutes — keeps Render frontend warm
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend (Railway)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://gridathon-production.up.railway.app/health)
          echo "Backend /health → $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Backend returned $STATUS"
          fi

      - name: Ping frontend (Render)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://drishti-ex4s.onrender.com)
          echo "Frontend / → $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Frontend returned $STATUS"
          fi
