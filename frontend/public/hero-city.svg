<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background glows -->
  <ellipse cx="450" cy="250" rx="380" ry="200" fill="url(#glow1)"/>
  <ellipse cx="200" cy="180" rx="220" ry="120" fill="url(#glow2)"/>

  <!-- Outer Ring Road (ORR) - main ring -->
  <ellipse cx="450" cy="250" rx="260" ry="155" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.5"/>

  <!-- Major corridors radiating from center -->
  <!-- Hosur Road (SE) -->
  <line x1="450" y1="250" x2="650" y2="380" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <!-- Mysore Road (SW) -->
  <line x1="450" y1="250" x2="220" y2="380" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <!-- Bellary Road (N) -->
  <line x1="450" y1="250" x2="450" y2="60" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <!-- Old Madras Road (NE) -->
  <line x1="450" y1="250" x2="700" y2="110" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <!-- Magadi Road (W) -->
  <line x1="450" y1="250" x2="150" y2="200" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <!-- Tumkur Road (NW) -->
  <line x1="450" y1="250" x2="240" y2="80" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <!-- Airport Road (NE) -->
  <line x1="450" y1="250" x2="720" y2="170" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>

  <!-- CBD inner ring -->
  <ellipse cx="450" cy="250" rx="80" ry="55" stroke="#22d3ee" stroke-width="1.5" opacity="0.35"/>

  <!-- CBD cross streets -->
  <line x1="370" y1="250" x2="530" y2="250" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="195" x2="450" y2="305" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>

  <!-- Zone nodes (hotspot markers) -->
  <!-- CBD / MG Road -->
  <circle cx="450" cy="250" r="8" fill="#22d3ee" opacity="0.9" filter="url(#blur2)"/>
  <circle cx="450" cy="250" r="4" fill="#22d3ee"/>
  <circle cx="450" cy="250" r="14" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>

  <!-- Silk Board -->
  <circle cx="570" cy="350" r="6" fill="#ef4444" opacity="0.85" filter="url(#blur2)"/>
  <circle cx="570" cy="350" r="3" fill="#ef4444"/>
  <circle cx="570" cy="350" r="12" stroke="#ef4444" stroke-width="0.8" opacity="0.3"/>

  <!-- Hebbal -->
  <circle cx="430" cy="95" r="5" fill="#10b981" opacity="0.85"/>
  <circle cx="430" cy="95" r="3" fill="#10b981"/>

  <!-- KR Puram -->
  <circle cx="670" cy="230" r="5" fill="#f59e0b" opacity="0.85"/>
  <circle cx="670" cy="230" r="3" fill="#f59e0b"/>

  <!-- Koramangala -->
  <circle cx="530" cy="320" r="5" fill="#3b82f6" opacity="0.85"/>
  <circle cx="530" cy="320" r="3" fill="#3b82f6"/>

  <!-- Whitefield -->
  <circle cx="740" cy="270" r="5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="740" cy="270" r="3" fill="#a78bfa"/>

  <!-- Electronic City -->
  <circle cx="480" cy="420" r="5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="480" cy="420" r="3" fill="#22d3ee"/>

  <!-- Yeshwanthpur -->
  <circle cx="290" cy="130" r="5" fill="#3b82f6" opacity="0.75"/>
  <circle cx="290" cy="130" r="3" fill="#3b82f6"/>

  <!-- Active route overlay (moving traffic) -->
  <line x1="450" y1="250" x2="570" y2="350" stroke="#ef4444" stroke-width="3" stroke-dasharray="12 8" opacity="0.7">
    <animate attributeName="stroke-dashoffset" from="0" to="40" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Data labels -->
  <text x="455" y="247" fill="#22d3ee" font-size="9" font-family="monospace" opacity="0.9">CBD</text>
  <text x="576" y="348" fill="#ef4444" font-size="8" font-family="monospace" opacity="0.9">SILK BOARD</text>
  <text x="415" y="91" fill="#10b981" font-size="8" font-family="monospace" opacity="0.9">HEBBAL</text>
  <text x="676" y="228" fill="#f59e0b" font-size="8" font-family="monospace" opacity="0.85">KR PURAM</text>

  <!-- Scanning pulse on CBD -->
  <circle cx="450" cy="250" r="24" stroke="#22d3ee" stroke-width="1" opacity="0">
    <animate attributeName="r" from="14" to="40" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.5" to="0" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner decorative elements -->
  <rect x="20" y="20" width="40" height="2" fill="#22d3ee" opacity="0.4"/>
  <rect x="20" y="20" width="2" height="40" fill="#22d3ee" opacity="0.4"/>
  <rect x="840" y="20" width="40" height="2" fill="#22d3ee" opacity="0.4"/>
  <rect x="878" y="20" width="2" height="40" fill="#22d3ee" opacity="0.4"/>
  <rect x="20" y="478" width="40" height="2" fill="#22d3ee" opacity="0.4"/>
  <rect x="20" y="460" width="2" height="40" fill="#22d3ee" opacity="0.4"/>
  <rect x="840" y="478" width="40" height="2" fill="#22d3ee" opacity="0.4"/>
  <rect x="878" y="460" width="2" height="40" fill="#22d3ee" opacity="0.4"/>
</svg>
