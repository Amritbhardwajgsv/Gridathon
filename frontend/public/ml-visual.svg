<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <defs>
    <radialGradient id="nodeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Input layer -->
  <circle cx="40" cy="50" r="7" fill="#0d1629" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="40" cy="100" r="7" fill="#0d1629" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="40" cy="150" r="7" fill="#0d1629" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- Hidden layer 1 -->
  <circle cx="120" cy="35" r="7" fill="#0d1629" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="120" cy="75" r="7" fill="#0d1629" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="120" cy="115" r="7" fill="#0d1629" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="120" cy="155" r="7" fill="#0d1629" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Hidden layer 2 -->
  <circle cx="200" cy="50" r="7" fill="#0d1629" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="200" cy="100" r="7" fill="#0d1629" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="200" cy="150" r="7" fill="#0d1629" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- Output layer -->
  <circle cx="280" cy="60" r="8" fill="#ef4444" stroke="#ef4444" stroke-width="1"/>
  <circle cx="280" cy="95" r="8" fill="#f59e0b" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="280" cy="130" r="8" fill="#3b82f6" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="280" cy="165" r="8" fill="#10b981" stroke="#10b981" stroke-width="1"/>

  <!-- Connections input → hidden1 -->
  <line x1="47" y1="50" x2="113" y2="35" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <line x1="47" y1="50" x2="113" y2="75" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <line x1="47" y1="50" x2="113" y2="115" stroke="#22d3ee" stroke-width="0.5" opacity="0.15"/>
  <line x1="47" y1="100" x2="113" y2="35" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
  <line x1="47" y1="100" x2="113" y2="75" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
  <line x1="47" y1="100" x2="113" y2="115" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
  <line x1="47" y1="100" x2="113" y2="155" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
  <line x1="47" y1="150" x2="113" y2="115" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <line x1="47" y1="150" x2="113" y2="155" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>

  <!-- Connections hidden1 → hidden2 -->
  <line x1="127" y1="35" x2="193" y2="50" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="127" y1="75" x2="193" y2="50" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
  <line x1="127" y1="75" x2="193" y2="100" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="127" y1="115" x2="193" y2="100" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <line x1="127" y1="115" x2="193" y2="150" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="127" y1="155" x2="193" y2="150" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>

  <!-- Connections hidden2 → output -->
  <line x1="207" y1="50" x2="272" y2="60" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="207" y1="100" x2="272" y2="95" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"/>
  <line x1="207" y1="150" x2="272" y2="130" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
  <line x1="207" y1="150" x2="272" y2="165" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>

  <!-- Labels -->
  <text x="28" y="175" fill="#22d3ee" font-size="7" font-family="monospace" opacity="0.7">INPUT</text>
  <text x="101" y="175" fill="#3b82f6" font-size="7" font-family="monospace" opacity="0.7">HIDDEN</text>
  <text x="181" y="175" fill="#a78bfa" font-size="7" font-family="monospace" opacity="0.7">HIDDEN</text>
  <text x="262" y="175" fill="#10b981" font-size="7" font-family="monospace" opacity="0.7">OUTPUT</text>

  <!-- Output labels -->
  <text x="292" y="64" fill="#ef4444" font-size="7.5" font-family="monospace">CRIT</text>
  <text x="292" y="99" fill="#f59e0b" font-size="7.5" font-family="monospace">HIGH</text>
  <text x="292" y="134" fill="#3b82f6" font-size="7.5" font-family="monospace">MED</text>
  <text x="292" y="169" fill="#10b981" font-size="7.5" font-family="monospace">LOW</text>
</svg>
